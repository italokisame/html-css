<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italico e Negrito</title>
</head>
<body>
    <p>termo em <b>negrito</b></p>
    <p><strong>termo em destaque</strong> com &lt;STRONG&gt;</p>
    <p>Aqui temos um termo em <i>Italico</i></p>
    <h1>Enfase</h1>
    <p>E aqui temos <em>Enfase</em></p>
    <p>ultilizando a tag <mark>mark</mark></p>
    <p>x<sup>20</sup></p>
    <p>H<sub>2</sub>O</p>
</body>
</html>
